{% extends 'base.html' %}

{% block contenu %}
<div class="deposit-wrapper">
    <div class="deposit-card animate-slide-up">
        
        <div class="deposit-header">
            <div class="header-icon">
                <i class="fas fa-plus-circle"></i>
            </div>
            <h1>Alimenter mon compte</h1>
            <p>Choisissez votre montant et votre mode de règlement</p>
        </div>

        <form method="post" class="deposit-form-modern" id="depositForm">
            {% csrf_token %}
            
            <div class="amount-input-section">
                <label for="montant">Montant du dépôt</label>
                <div class="amount-field-wrapper">
                    <input type="number" id="montant" name="montant" step="1" min="1000" placeholder="0" required>
                    <span class="currency-tag">$</span>
                </div>
                <div class="quick-amounts">
                    <button type="button" class="q-btn" data-val="10000">+10k</button>
                    <button type="button" class="q-btn" data-val="50000">+50k</button>
                    <button type="button" class="q-btn" data-val="100000">+100k</button>
                </div>
            </div>

            <div class="payment-method-section">
                <label>Méthode de paiement</label>
                <div class="payment-tiles">
                    <label class="p-tile">
                        <input type="radio" name="methode" value="mobile_money" required>
                        <div class="tile-content">
                            <i class="fas fa-mobile-screen-button"></i>
                            <span>Mobile Money</span>
                        </div>
                    </label>
                    <label class="p-tile">
                        <input type="radio" name="methode" value="virement_bancaire">
                        <div class="tile-content">
                            <i class="fas fa-building-columns"></i>
                            <span>Virement</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="reference-section">
                <label for="reference">ID de Transaction / Référence</label>
                <div class="input-with-icon-modern">
                    <i class="fas fa-hashtag"></i>
                    <input type="text" id="reference" name="reference" placeholder="Ex: 8974521..." required>
                </div>
                <p class="helper-text">Saisissez le code reçu après votre transfert.</p>
            </div>

            <button type="submit" class="btn-deposit-submit">
                <span>Finaliser le dépôt</span>
                <i class="fas fa-arrow-right"></i>
            </button>
        </form>

        <div class="security-footer">
            <i class="fas fa-user-shield"></i>
            <span>Système de vérification sécurisé 256-bit</span>
        </div>
    </div>
</div>

<style>
    :root {
        --d-navy: #0f172a;
        --d-sky: #0ea5e9;
        --d-bg: #f1f5f9;
        --d-white: #ffffff;
        --d-text: #334155;
    }

    .deposit-wrapper { background: var(--d-bg); min-height: 100vh; padding: 40px 20px; font-family: 'Inter', sans-serif; }
    .deposit-card { max-width: 450px; margin: 0 auto; background: var(--d-white); border-radius: 32px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

    /* HEADER */
    .deposit-header { text-align: center; margin-bottom: 35px; }
    .header-icon { width: 60px; height: 60px; background: #e0f2fe; color: var(--d-sky); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 26px; margin: 0 auto 15px; }
    .deposit-header h1 { font-size: 24px; font-weight: 900; color: var(--d-navy); margin: 0; }
    .deposit-header p { font-size: 14px; color: #64748b; margin-top: 8px; }

    /* AMOUNT SECTION */
    .amount-input-section { margin-bottom: 30px; }
    .amount-input-section label { display: block; font-size: 13px; font-weight: 700; color: var(--d-navy); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .amount-field-wrapper { position: relative; display: flex; align-items: center; }
    .amount-field-wrapper input { width: 100%; border: none; border-bottom: 3px solid #f1f5f9; padding: 10px 0; font-size: 42px; font-weight: 900; color: var(--d-navy); outline: none; transition: 0.3s; }
    .amount-field-wrapper input:focus { border-color: var(--d-sky); }
    .currency-tag { font-size: 20px; font-weight: 800; color: #94a3b8; margin-left: 10px; }

    .quick-amounts { display: flex; gap: 10px; margin-top: 15px; }
    .q-btn { flex: 1; border: 1px solid #e2e8f0; background: none; padding: 8px; border-radius: 10px; font-size: 12px; font-weight: 700; color: #64748b; cursor: pointer; transition: 0.2s; }
    .q-btn:hover { background: #f8fafc; border-color: var(--d-sky); color: var(--d-sky); }

    /* PAYMENT TILES */
    .payment-method-section { margin-bottom: 30px; }
    .payment-method-section label { display: block; font-size: 13px; font-weight: 700; color: var(--d-navy); margin-bottom: 12px; }
    .payment-tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .p-tile input { display: none; }
    .tile-content { border: 2px solid #f1f5f9; border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
    .tile-content i { font-size: 24px; display: block; margin-bottom: 8px; color: #94a3b8; }
    .tile-content span { font-size: 13px; font-weight: 700; color: #64748b; }
    
    .p-tile input:checked + .tile-content { border-color: var(--d-sky); background: #f0f9ff; }
    .p-tile input:checked + .tile-content i { color: var(--d-sky); }
    .p-tile input:checked + .tile-content span { color: var(--d-sky); }

    /* REFERENCE SECTION */
    .reference-section { margin-bottom: 35px; }
    .reference-section label { display: block; font-size: 13px; font-weight: 700; color: var(--d-navy); margin-bottom: 12px; }
    .input-with-icon-modern { display: flex; align-items: center; background: #f8fafc; border-radius: 14px; padding: 4px 15px; }
    .input-with-icon-modern i { color: #94a3b8; font-size: 14px; }
    .input-with-icon-modern input { border: none; background: none; padding: 12px 10px; width: 100%; outline: none; font-weight: 600; }
    .helper-text { font-size: 11px; color: #94a3b8; margin-top: 8px; }

    /* SUBMIT BUTTON */
    .btn-deposit-submit { width: 100%; background: var(--d-navy); color: white; border: none; padding: 18px; border-radius: 18px; font-size: 16px; font-weight: 700; display: flex; justify-content: center; align-items: center; gap: 12px; cursor: pointer; transition: 0.3s; }
    .btn-deposit-submit:hover { background: var(--d-sky); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2); }

    .security-footer { text-align: center; margin-top: 25px; font-size: 12px; color: #94a3b8; font-weight: 600; }
    .security-footer i { margin-right: 5px; color: #10b981; }

    /* ANIMATIONS */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: fadeInUp 0.6s ease-out; }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const montantInput = document.getElementById('montant');
        const quickBtns = document.querySelectorAll('.q-btn');

        // Gestion des boutons de montant rapide
        quickBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const val = parseInt(btn.getAttribute('data-val'));
                const current = parseInt(montantInput.value) || 0;
                montantInput.value = current + val;
                
                // Effet de feedback visuel sur l'input
                montantInput.style.transform = 'scale(1.05)';
                setTimeout(() => montantInput.style.transform = 'scale(1)', 100);
            });
        });

        // Validation simple
        const form = document.getElementById('depositForm');
        form.addEventListener('submit', function(e) {
            const selectedMethod = document.querySelector('input[name="methode"]:checked');
            if (!selectedMethod) {
                e.preventDefault();
                alert('Veuillez sélectionner une méthode de paiement');
            }
        });
    });
</script>
{% endblock %}
