{% extends 'base.html' %}

{% block contenu %}

<style>
/* ===== CONTAINER ===== */
.create-container {
    max-width: 500px;
    margin: 60px auto;
    padding: 30px;
    font-family: 'Segoe UI', sans-serif;
}

/* ===== CARD ===== */
.create-card {
    background: #ffffff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    animation: slideUp 0.5s ease;
}

/* ===== TITLE ===== */
.create-card h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #333;
}

/* ===== FORM ===== */
.create-card form p {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
}

.create-card label {
    font-weight: 600;
    margin-bottom: 5px;
    color: #444;
}

.create-card input,
.create-card textarea,
.create-card select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    outline: none;
    transition: 0.3s;
    font-size: 14px;
}

.create-card input:focus,
.create-card textarea:focus,
.create-card select:focus {
    border-color: #4CAF50;
    box-shadow: 0 0 5px rgba(76,175,80,0.4);
}

/* ===== BUTTON ===== */
.btn-create-group {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #4CAF50, #2e7d32);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.btn-create-group:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

/* ===== ANIMATION ===== */
@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* ===== SUCCESS MESSAGE (JS) ===== */
.success-message {
    display: none;
    background: #e8f5e9;
    color: #2e7d32;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    text-align: center;
    font-weight: 500;
}
</style>


<div class="create-container">
    <div class="create-card">
        <h1>➕ Créer un groupe</h1>

        <div class="success-message" id="successMessage">
            Groupe en cours de création...
        </div>

        <form method="post" id="createForm">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-create-group">
                Créer le groupe
            </button>
        </form>
    </div>
</div>


<script>
// Animation bouton + message
document.getElementById("createForm").addEventListener("submit", function() {
    const btn = document.querySelector(".btn-create-group");
    const message = document.getElementById("successMessage");

    btn.innerText = "Création...";
    btn.style.opacity = "0.7";
    message.style.display = "block";
});
</script>

{% endblock %}
